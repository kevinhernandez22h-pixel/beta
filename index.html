<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGestión - Beta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-success mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">💬 ChatGestión <span class="badge bg-warning text-dark text-xs">Beta Prototipo</span></span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            
            <div class="col-md-5">
                <div class="card p-4 mb-4">
                    <h4 class="mb-3 text-success">📦 Inventario Rápido</h4>
                    <div class="mb-3">
                        <label class="form-label">Producto</label>
                        <input type="text" id="prodNombre" class="form-control" placeholder="Ej: Franela Negra M">
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Precio ($)</label>
                            <input type="number" id="prodPrecio" class="form-control" placeholder="10">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Stock</label>
                            <input type="number" id="prodStock" class="form-control" placeholder="15">
                        </div>
                    </div>
                    <button onclick="guardarProducto()" class="btn btn-success w-100">Añadir al Inventario</button>
                </div>

                <div class="card p-3">
                    <h5 class="text-muted mb-3">Productos Disponibles</h5>
                    <div class="table-responsive">
                        <table class="table table-sm align-middle">
                            <thead>
                                <tr><th>Item</th><th>Precio</th><th>Stock</th></tr>
                            </thead>
                            <tbody id="tablaInventario">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card p-4 h-100">
                    <h4 class="mb-3 text-primary">🛒 Nueva Venta (Chat)</h4>
                    <div class="mb-3">
                        <label class="form-label">Seleccionar Producto</label>
                        <select id="selectProducto" class="form-select" onchange="actualizarPrecioMax()"></select>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label">Cantidad a Vender</label>
                            <input type="number" id="ventaCantidad" class="form-control" value="1" min="1">
                        </div>
                        <div class="col-6 d-flex align-items-end">
                            <button onclick="agregarAlCarrito()" class="btn btn-primary w-100">Agregar al Pedido</button>
                        </div>
                    </div>

                    <hr>

                    <h5 class="text-secondary">Resumen del Pedido</h5>
                    <div id="resumenPedido" class="bg-light p-3 rounded mb-3 style-plain" style="font-family: monospace; white-space: pre-wrap;">
No hay productos en la orden.
                    </div>

                    <button onclick="enviarPorWhatsApp()" class="btn btn-outline-success w-100 py-2 fw-bold">
                        🚀 Enviar Recibo a WhatsApp (Elegir Contacto)
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        let inventario = JSON.parse(localStorage.getItem('inventario')) || [];
        let carrito = [];

        function guardarProducto() {
            const nombre = document.getElementById('prodNombre').value;
            const precio = parseFloat(document.getElementById('prodPrecio').value);
            const stock = parseInt(document.getElementById('prodStock').value);

            if(!nombre || isNaN(precio) || isNaN(stock)) return alert("Completa todos los campos");

            inventario.push({ nombre, precio, stock });
            localStorage.setItem('inventario', JSON.stringify(inventario));
            
            // Limpiar campos
            document.getElementById('prodNombre').value = '';
            document.getElementById('prodPrecio').value = '';
            document.getElementById('prodStock').value = '';

            renderizarTodo();
        }

        function renderizarTodo() {
            // Render Tabla Inventario
            const tabla = document.getElementById('tablaInventario');
            const select = document.getElementById('selectProducto');
            tabla.innerHTML = '';
            select.innerHTML = '<option value="">-- Seleccione --</option>';

            inventario.forEach((prod, index) => {
                tabla.innerHTML += `<tr><td>${prod.nombre}</td><td>$${prod.precio}</td><td><span class="badge bg-secondary">${prod.stock} unids</span></td></tr>`;
                if(prod.stock > 0){
                    select.innerHTML += `<option value="${index}">${prod.nombre} ($${prod.precio})</option>`;
                }
            });

            actualizarVistaCarrito();
        }

        function agregarAlCarrito() {
            const select = document.getElementById('selectProducto');
            const index = select.value;
            const cantidad = parseInt(document.getElementById('ventaCantidad').value);

            if(index === "") return alert("Selecciona un producto válido");
            
            const productoObj = inventario[index];

            if(cantidad > productoObj.stock) return alert("No tienes suficiente stock disponible");

            // Descontar del inventario local simulado
            productoObj.stock -= cantidad;
            localStorage.setItem('inventario', JSON.stringify(inventario));

            // Agregar al carrito temporal de la venta
            carrito.push({ nombre: productoObj.nombre, precio: productoObj.precio, cantidad: cantidad });
            
            renderizarTodo();
        }

        function actualizarVistaCarrito() {
            const resumen = document.getElementById('resumenPedido');
            if(carrito.length === 0) {
                resumen.innerText = "No hay productos en la orden.";
                return;
            }

            let texto = `🧾 *RECIBO DE COMPRA*\n---------------------------\n`;
            let total = 0;
            carrito.forEach(item => {
                let subtotal = item.precio * item.cantidad;
                total += subtotal;
                texto += `▪️ ${item.cantidad}x ${item.nombre} -> $${subtotal}\n`;
            });
            texto += `---------------------------\n💰 *TOTAL A PAGAR: $${total}*\n\n🙏 ¡Gracias por tu confianza!`;
            resumen.innerText = texto;
        }

        function enviarPorWhatsApp() {
            if(carrito.length === 0) return alert("El pedido está vacío.");

            const resumenTexto = document.getElementById('resumenPedido').innerText;
            
            // Aquí ocurre el truco: sin número de teléfono, abre la lista de contactos de WhatsApp
            const enlaceWhatsApp = `https://wa.me/?text=${encodeURIComponent(resumenTexto)}`;
            
            // Limpiar carrito para la siguiente venta
            carrito = [];
            actualizarVistaCarrito();

            // Abrir ventana de WhatsApp
            window.open(enlaceWhatsApp, '_blank');
        }

        // Carga inicial
        renderizarTodo();
    </script>
</body>
</html>
